<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KiriKiroid2 Web</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e0e0e0;
        }

        #container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        canvas#canvas {
            display: block;
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            touch-action: none;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            z-index: 100;
            transition: opacity 0.5s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #loading h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #e94560;
        }

        #progress-bar {
            width: 300px;
            height: 6px;
            background: #16213e;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #e94560, #0f3460);
            border-radius: 3px;
            transition: width 0.3s;
        }

        #status {
            font-size: 14px;
            color: #888;
        }

        #error-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.85);
            z-index: 200;
        }

        #error-overlay.visible {
            display: flex;
        }

        #error-box {
            background: #16213e;
            padding: 30px;
            border-radius: 8px;
            max-width: 500px;
            text-align: center;
        }

        #error-box h2 {
            color: #e94560;
            margin-bottom: 10px;
        }

        #error-box p {
            color: #ccc;
            line-height: 1.6;
        }

        #file-picker {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            z-index: 150;
        }

        #file-picker.visible { display: flex; }

        #picker-box {
            text-align: center;
            max-width: 480px;
            width: 90%;
        }

        #picker-box h1 {
            font-size: 26px;
            color: #e94560;
            margin-bottom: 8px;
        }

        #picker-box .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 28px;
        }

        #drop-zone {
            border: 2px dashed #0f3460;
            border-radius: 12px;
            padding: 48px 24px;
            margin-bottom: 20px;
            transition: border-color 0.2s, background 0.2s;
            cursor: pointer;
        }

        #drop-zone.dragover {
            border-color: #e94560;
            background: rgba(233,69,96,0.08);
        }

        #drop-zone .icon {
            font-size: 48px;
            margin-bottom: 12px;
        }

        #drop-zone .label {
            font-size: 16px;
            color: #ccc;
            margin-bottom: 6px;
        }

        #drop-zone .hint {
            font-size: 13px;
            color: #666;
        }

        .picker-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .picker-buttons button {
            padding: 10px 24px;
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #e94560;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .picker-buttons button:hover {
            background: #e94560;
            color: #fff;
        }

        .picker-buttons button.primary {
            background: #e94560;
            color: #fff;
            font-weight: 600;
        }

        .picker-buttons button.primary:hover {
            background: #c73652;
        }

        .picker-divider {
            width: 100%;
            text-align: center;
            color: #555;
            font-size: 13px;
            margin: 14px 0 6px;
        }

        #picker-status {
            margin-top: 20px;
            font-size: 14px;
            color: #888;
            min-height: 20px;
        }

        .feedback-link {
            margin-top: 24px;
            font-size: 13px;
        }

        .feedback-link a {
            color: #888;
            text-decoration: none;
            transition: color 0.2s;
        }

        .feedback-link a:hover {
            color: #e94560;
        }

        #picker-progress {
            width: 100%;
            height: 6px;
            background: #16213e;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 10px;
            display: none;
        }

        #picker-progress.visible { display: block; }

        #picker-progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #e94560, #0f3460);
            border-radius: 3px;
            transition: width 0.2s;
        }

        #xp3-selector {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            align-items: center;
            justify-content: center;
            background: #1a1a2e;
            z-index: 160;
        }

        #xp3-selector.visible { display: flex; }

        #selector-box {
            text-align: center;
            max-width: 520px;
            width: 90%;
        }

        #selector-box h2 {
            font-size: 22px;
            color: #e94560;
            margin-bottom: 8px;
        }

        #selector-box .subtitle {
            color: #888;
            font-size: 14px;
            margin-bottom: 20px;
        }

        #xp3-list {
            max-height: 60vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .xp3-item {
            display: block;
            width: 100%;
            padding: 12px 16px;
            background: #16213e;
            color: #e0e0e0;
            border: 1px solid #0f3460;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            text-align: left;
            transition: background 0.2s, border-color 0.2s;
        }

        .xp3-item:hover {
            background: #0f3460;
            border-color: #e94560;
        }

        .xp3-item .xp3-name {
            font-weight: 600;
        }

        .xp3-item .xp3-dir {
            font-size: 12px;
            color: #666;
            margin-top: 2px;
        }
    </style>
</head>
<body>
    <div id="loading">
        <h1>KiriKiroid2 Web</h1>
        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>
        <div id="status">Loading...</div>
    </div>

    <div id="error-overlay">
        <div id="error-box">
            <h2>Error</h2>
            <p id="error-message"></p>
        </div>
    </div>

    <div id="container">
        <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    </div>

    <div id="file-picker">
        <div id="picker-box">
            <h1>KiriKiroid2 Web</h1>
            <p class="subtitle">Select a game file to start</p>
            <div id="drop-zone">
                <div class="icon">&#128193;</div>
                <div class="label">Drag & drop .xp3 file here</div>
                <div class="hint">or use the buttons below</div>
            </div>
            <div class="picker-buttons">
                <button id="pick-dir-api-btn" class="primary" style="display:none">Open Game Directory</button>
                <div id="picker-divider" class="picker-divider" style="display:none">or load a copy into memory</div>
                <button id="pick-file-btn">Select .xp3 File</button>
                <button id="pick-dir-btn">Upload Folder</button>
            </div>
            <div id="picker-status"></div>
            <div id="picker-progress"><div id="picker-progress-fill"></div></div>
            <div class="feedback-link"><a href="https://github.com/fenghengzhi/krkr2/issues" target="_blank" rel="noopener">Feedback & Issues</a></div>
        </div>
    </div>
    <div id="xp3-selector">
        <div id="selector-box">
            <h2>Select Game Archive</h2>
            <p class="subtitle">Multiple .xp3 files found. Choose one to start:</p>
            <div id="xp3-list"></div>
        </div>
    </div>

    <input type="file" id="file-input" style="display:none;">
    <input type="file" id="dir-input" webkitdirectory style="display:none;">

    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script>
        var statusElement = document.getElementById('status');
        var progressFill = document.getElementById('progress-fill');
        var loadingOverlay = document.getElementById('loading');
        var filePicker = document.getElementById('file-picker');
        var pickerStatus = document.getElementById('picker-status');
        var pickerProgress = document.getElementById('picker-progress');
        var pickerProgressFill = document.getElementById('picker-progress-fill');
        var gameFileReady = false;
        var userFileDepAdded = false;
        var hasFileSystemAPI = typeof window.showDirectoryPicker === 'function';

        // --- File System Access API state ---
        var hostDirHandle = null;

        var Module = {
            preRun: [function() {
                Module.addRunDependency('user-file');
                userFileDepAdded = true;
                if (gameFileReady) {
                    Module.removeRunDependency('user-file');
                }
            }],
            postRun: [function() {
                loadingOverlay.classList.add('hidden');
            }],
            print: function(text) { console.log(text); },
            printErr: function(text) { console.error(text); },
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener('webglcontextlost', function(e) {
                    alert('WebGL context lost. Please reload the page.');
                    e.preventDefault();
                }, false);
                return canvas;
            })(),
            setStatus: function(text) {
                if (!text) {
                    loadingOverlay.classList.add('hidden');
                    if (!gameFileReady && !xp3Url && !gameZipUrl) {
                        filePicker.classList.add('visible');
                    }
                    return;
                }
                var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
                if (m) {
                    var pct = (parseInt(m[2]) / parseInt(m[4])) * 100;
                    progressFill.style.width = pct + '%';
                    statusElement.textContent = m[1].trim();
                } else {
                    statusElement.textContent = text;
                }
            },
            onAbort: function(what) {
                document.getElementById('error-message').textContent =
                    'The application has aborted. ' + what;
                document.getElementById('error-overlay').classList.add('visible');
            },
            monitorRunDependencies: function(left) {
                if (left === 0) {
                    Module.setStatus('');
                } else if (!gameFileReady) {
                    Module.setStatus('Preparing engine... (' + left + ' remaining)');
                } else {
                    Module.setStatus('Starting... (' + left + ' remaining)');
                }
            }
        };

        Module.setStatus('Downloading engine...');

        window.onerror = function(event) {
            Module.setStatus('Error: see console');
        };

        (function() {
            var canvas = document.getElementById('canvas');
            var container = document.getElementById('container');
            function updateCanvasSize() {
                var w = Math.round(container.clientWidth) || 1280;
                var h = Math.round(container.clientHeight) || 720;
                if (canvas.width !== w || canvas.height !== h) {
                    canvas.width = w;
                    canvas.height = h;
                }
            }
            updateCanvasSize();
            new ResizeObserver(updateCanvasSize).observe(container);
        })();

        var urlParams = new URLSearchParams(window.location.search);
        var xp3Url = urlParams.get('xp3');
        var gameZipUrl = urlParams.get('game');
        var entryXp3 = urlParams.get('entry');

        // Show File System API button when supported
        if (hasFileSystemAPI) {
            document.getElementById('pick-dir-api-btn').style.display = '';
            document.getElementById('picker-divider').style.display = '';
        }

        // --- Common helpers ---
        function ensureDir(path) {
            var parts = path.split('/').filter(Boolean);
            var cur = '';
            for (var i = 0; i < parts.length; i++) {
                cur += '/' + parts[i];
                try { FS.mkdir(cur); } catch(e) {}
            }
        }

        function writeFileToFS(fullPath, data) {
            var dir = fullPath.substring(0, fullPath.lastIndexOf('/'));
            if (dir) ensureDir(dir);
            FS.writeFile(fullPath, data);
        }

        function setPickerProgress(pct, text) {
            pickerProgress.classList.add('visible');
            pickerProgressFill.style.width = pct + '%';
            if (text) pickerStatus.textContent = text;
        }

        function readFileWithProgress(file) {
            return new Promise(function(resolve, reject) {
                var reader = new FileReader();
                var sizeMB = (file.size / 1048576).toFixed(1);
                reader.onprogress = function(e) {
                    if (e.lengthComputable) {
                        var pct = Math.round(e.loaded / e.total * 100);
                        setPickerProgress(pct, 'Reading ' + file.name + ' (' + sizeMB + ' MB)... ' + pct + '%');
                    }
                };
                reader.onload = function(e) {
                    resolve(new Uint8Array(e.target.result));
                };
                reader.onerror = function() { reject(reader.error); };
                reader.readAsArrayBuffer(file);
            });
        }

        function showXp3Selector(xp3Paths, dirPrefix, callback) {
            var selectorEl = document.getElementById('xp3-selector');
            var listEl = document.getElementById('xp3-list');
            listEl.innerHTML = '';

            xp3Paths.sort(function(a, b) {
                return a.toLowerCase().localeCompare(b.toLowerCase());
            });

            for (var i = 0; i < xp3Paths.length; i++) {
                (function(path) {
                    var name = path.substring(path.lastIndexOf('/') + 1);
                    var dir = path.substring(0, path.lastIndexOf('/'));
                    var relDir = dirPrefix ? dir.substring(dirPrefix.length) : dir;

                    var btn = document.createElement('button');
                    btn.className = 'xp3-item';
                    btn.innerHTML = '<div class="xp3-name">' + name + '</div>' +
                        (relDir ? '<div class="xp3-dir">' + relDir + '</div>' : '');
                    btn.addEventListener('click', function() {
                        selectorEl.classList.remove('visible');
                        callback(path);
                    });
                    listEl.appendChild(btn);
                })(xp3Paths[i]);
            }

            filePicker.classList.remove('visible');
            pickerProgress.classList.remove('visible');
            selectorEl.classList.add('visible');
        }

        function checkAndStartGame(xp3Paths, dirPrefix) {
            if (xp3Paths.length > 1) {
                showXp3Selector(xp3Paths, dirPrefix, function(path) {
                    Module._startupXp3Path = path;
                    startGame();
                });
            } else {
                startGame();
            }
        }

        function startGame() {
            gameFileReady = true;
            filePicker.classList.remove('visible');
            loadingOverlay.classList.remove('hidden');
            statusElement.textContent = 'Starting game...';
            progressFill.style.width = '100%';
            if (userFileDepAdded) {
                Module.removeRunDependency('user-file');
            }
        }

        // --- Auto-load from URL parameter: ?xp3=<url> ---
        async function fetchXp3FromUrl(url) {
            loadingOverlay.classList.remove('hidden');
            statusElement.textContent = 'Downloading game data...';
            progressFill.style.width = '0%';
            try {
                var resp = await fetch(url);
                if (!resp.ok) throw new Error('HTTP ' + resp.status + ' ' + resp.statusText);
                var total = parseInt(resp.headers.get('Content-Length') || '0', 10);
                var reader = resp.body.getReader();
                var chunks = [];
                var loaded = 0;
                while (true) {
                    var r = await reader.read();
                    if (r.done) break;
                    chunks.push(r.value);
                    loaded += r.value.length;
                    if (total > 0) {
                        var pct = Math.round(loaded / total * 100);
                        progressFill.style.width = pct + '%';
                        statusElement.textContent = 'Downloading... ' + pct + '%';
                    } else {
                        statusElement.textContent = 'Downloading... ' + (loaded / 1048576).toFixed(1) + ' MB';
                    }
                }
                var data = new Uint8Array(loaded);
                var offset = 0;
                for (var i = 0; i < chunks.length; i++) {
                    data.set(chunks[i], offset);
                    offset += chunks[i].length;
                }
                statusElement.textContent = 'Writing to filesystem...';
                writeFileToFS('/data.xp3', data);
                startGame();
            } catch (err) {
                statusElement.textContent = 'Download failed: ' + err.message;
                progressFill.style.width = '0%';
                console.error('fetchXp3FromUrl error:', err);
                filePicker.classList.add('visible');
                loadingOverlay.classList.add('hidden');
            }
        }

        async function fetchWithProgress(url, onProgress) {
            var resp = await fetch(url);
            if (!resp.ok) throw new Error('HTTP ' + resp.status + ' ' + resp.statusText);
            var total = parseInt(resp.headers.get('Content-Length') || '0', 10);
            var reader = resp.body.getReader();
            var chunks = [];
            var loaded = 0;
            while (true) {
                var r = await reader.read();
                if (r.done) break;
                chunks.push(r.value);
                loaded += r.value.length;
                if (onProgress) onProgress(loaded, total);
            }
            var data = new Uint8Array(loaded);
            var offset = 0;
            for (var i = 0; i < chunks.length; i++) {
                data.set(chunks[i], offset);
                offset += chunks[i].length;
            }
            return data;
        }

        async function fetchAndExtractZip(url, entryFile) {
            loadingOverlay.classList.remove('hidden');
            statusElement.textContent = 'Downloading game archive...';
            progressFill.style.width = '0%';
            try {
                var zipData = await fetchWithProgress(url, function(loaded, total) {
                    if (total > 0) {
                        var pct = Math.round(loaded / total * 100);
                        progressFill.style.width = (pct * 0.5) + '%';
                        statusElement.textContent = 'Downloading... ' + pct + '% (' + (loaded / 1048576).toFixed(1) + ' MB)';
                    } else {
                        statusElement.textContent = 'Downloading... ' + (loaded / 1048576).toFixed(1) + ' MB';
                    }
                });

                statusElement.textContent = 'Extracting archive...';
                progressFill.style.width = '50%';
                var zip = await JSZip.loadAsync(zipData);
                zipData = null;

                var entries = [];
                zip.forEach(function(relativePath, zipEntry) {
                    if (!zipEntry.dir) entries.push({ path: relativePath, entry: zipEntry });
                });

                var commonPrefix = '';
                if (entries.length > 0) {
                    var firstSlash = entries[0].path.indexOf('/');
                    if (firstSlash > 0) {
                        var candidate = entries[0].path.substring(0, firstSlash + 1);
                        var allMatch = entries.every(function(e) { return e.path.startsWith(candidate); });
                        if (allMatch) commonPrefix = candidate;
                    }
                }

                var xp3Paths = [];
                var total = entries.length;
                for (var i = 0; i < total; i++) {
                    var e = entries[i];
                    var innerPath = commonPrefix ? e.path.substring(commonPrefix.length) : e.path;
                    if (!innerPath) continue;
                    var fsPath = '/' + innerPath;
                    var lowerName = innerPath.substring(innerPath.lastIndexOf('/') + 1).toLowerCase();

                    var pct = 50 + Math.round(i / total * 50);
                    progressFill.style.width = pct + '%';
                    statusElement.textContent = 'Extracting (' + (i + 1) + '/' + total + ') ' + innerPath;

                    var fileData = await e.entry.async('uint8array');
                    writeFileToFS(fsPath, fileData);

                    if (lowerName.endsWith('.xp3')) xp3Paths.push(fsPath);
                }

                progressFill.style.width = '100%';
                statusElement.textContent = 'Starting game...';

                if (entryFile) {
                    var entryLower = entryFile.toLowerCase();
                    var matched = xp3Paths.find(function(p) {
                        return p.substring(p.lastIndexOf('/') + 1).toLowerCase() === entryLower;
                    });
                    if (matched) Module._startupXp3Path = matched;
                    startGame();
                } else if (xp3Paths.length > 1) {
                    checkAndStartGame(xp3Paths, '');
                } else {
                    startGame();
                }
            } catch (err) {
                statusElement.textContent = 'Failed: ' + err.message;
                progressFill.style.width = '0%';
                console.error('fetchAndExtractZip error:', err);
                filePicker.classList.add('visible');
                loadingOverlay.classList.add('hidden');
            }
        }

        if (gameZipUrl) {
            fetchAndExtractZip(gameZipUrl, entryXp3);
        } else if (xp3Url) {
            fetchXp3FromUrl(xp3Url);
        }

        // --- File System Access API: directory picker + save sync ---
        async function enumerateDir(dirHandle, prefix) {
            var files = [];
            for await (var entry of dirHandle.values()) {
                var path = prefix + '/' + entry.name;
                if (entry.kind === 'directory') {
                    files = files.concat(await enumerateDir(entry, path));
                } else {
                    files.push({ path: path, handle: entry });
                }
            }
            return files;
        }

        async function handleDirectoryAPI() {
            try {
                hostDirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
            } catch (err) {
                if (err.name !== 'AbortError')
                    pickerStatus.textContent = 'Error: ' + err.message;
                return;
            }

            try {
                setPickerProgress(0, 'Scanning directory...');
                var dirPrefix = '/' + hostDirHandle.name;
                var entries = await enumerateDir(hostDirHandle, dirPrefix);
                var total = entries.length;
                if (total === 0) {
                    pickerStatus.textContent = 'Directory is empty.';
                    pickerProgress.classList.remove('visible');
                    hostDirHandle = null;
                    return;
                }

                Module._hostDirHandle = hostDirHandle;
                Module._hostDirPrefix = dirPrefix;

                var xp3Paths = [];

                for (var i = 0; i < total; i++) {
                    var entry = entries[i];
                    var innerPath = entry.path.substring(dirPrefix.length);
                    var lowerName = innerPath.substring(innerPath.lastIndexOf('/') + 1).toLowerCase();
                    var isXp3 = lowerName.endsWith('.xp3');

                    setPickerProgress(
                        Math.round(i / total * 100),
                        'Loading (' + (i + 1) + '/' + total + ') ' + innerPath.substring(1)
                    );

                    var file = await entry.handle.getFile();
                    var data = new Uint8Array(await file.arrayBuffer());
                    writeFileToFS(innerPath, data);

                    if (isXp3) xp3Paths.push(innerPath);
                }

                setPickerProgress(100, 'Starting...');
                checkAndStartGame(xp3Paths, '');
            } catch (err) {
                pickerStatus.textContent = 'Error: ' + err.message;
                pickerProgress.classList.remove('visible');
                hostDirHandle = null;
            }
        }

        // --- Fallback: .xp3 file picker ---
        async function handleXp3File(file) {
            try {
                setPickerProgress(0, 'Reading ' + file.name + '...');
                var data = await readFileWithProgress(file);
                setPickerProgress(100, 'Writing to filesystem...');
                writeFileToFS('/data.xp3', data);
                startGame();
            } catch (err) {
                pickerStatus.textContent = 'Error: ' + err.message;
                pickerProgress.classList.remove('visible');
            }
        }

        async function handleFolder(files) {
            var total = files.length;
            try {
                var xp3Paths = [];
                var folderPrefix = '/' + files[0].webkitRelativePath.split('/')[0];

                for (var i = 0; i < total; i++) {
                    var file = files[i];
                    var fullPath = '/' + file.webkitRelativePath;
                    var innerPath = fullPath.substring(folderPrefix.length);
                    var lowerName = file.name.toLowerCase();
                    var isXp3 = lowerName.endsWith('.xp3');

                    setPickerProgress(Math.round(i / total * 100),
                        'Loading (' + (i + 1) + '/' + total + ') ' + file.name);

                    var data = new Uint8Array(await file.arrayBuffer());
                    writeFileToFS(innerPath, data);

                    if (isXp3) xp3Paths.push(innerPath);
                }

                checkAndStartGame(xp3Paths, '');
            } catch (err) {
                pickerStatus.textContent = 'Error: ' + err.message;
                pickerProgress.classList.remove('visible');
            }
        }

        // --- Button bindings ---
        document.getElementById('pick-dir-api-btn').addEventListener('click', handleDirectoryAPI);

        document.getElementById('pick-file-btn').addEventListener('click', function() {
            document.getElementById('file-input').click();
        });
        document.getElementById('pick-dir-btn').addEventListener('click', function() {
            document.getElementById('dir-input').click();
        });

        document.getElementById('file-input').addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (file) handleXp3File(file);
            e.target.value = '';
        });

        document.getElementById('dir-input').addEventListener('change', function(e) {
            var files = Array.from(e.target.files);
            if (files.length > 0) handleFolder(files);
            e.target.value = '';
        });

        // Drag & drop
        var dropZone = document.getElementById('drop-zone');
        dropZone.addEventListener('click', function() {
            document.getElementById('file-input').click();
        });
        dropZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', function() {
            dropZone.classList.remove('dragover');
        });
        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            var file = e.dataTransfer.files[0];
            if (file) handleXp3File(file);
        });
    </script>
    <script async type="text/javascript" src="index.js"></script>
</body>
</html>
